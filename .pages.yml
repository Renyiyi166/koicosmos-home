media:
  input: public/media
  output: /media

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/blog
    filename: "{fields.slug}.md"
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - { name: description, label: SEO Description, type: text, required: true }
      - { name: pubDate, label: Publish Date, type: date, required: true }
      - { name: updatedDate, label: Updated Date, type: date }
      - { name: draft, label: Draft, type: boolean, default: false }
      - { name: tags, label: Tags, type: string, list: true }
      - { name: body, label: Body, type: rich-text }
  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    filename: "{fields.slug}.md"
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: slug, label: Slug, type: string, required: true }
      - { name: description, label: Description, type: text, required: true }
      - { name: url, label: URL, type: string }
      - { name: order, label: Order, type: number, default: 10 }
      - { name: body, label: Body, type: rich-text }
