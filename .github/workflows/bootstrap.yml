name: Bootstrap Koicosmos Home

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Restore project files
        run: |
          cat > /tmp/koicosmos-home.tgz.b64 <<'EOF'
          
          EOF
          base64 -d /tmp/koicosmos-home.tgz.b64 > /tmp/koicosmos-home.tgz
          tar -xzf /tmp/koicosmos-home.tgz -C .
          rm -f .github/workflows/bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Initial Koicosmos Astro site" || exit 0
          git push
